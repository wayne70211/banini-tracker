apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: banini-tracker
spec:
  description: "Reverse indicator tracker for 巴逆逆(8zz) — AI-powered Facebook post analysis + multi-platform notifications"
  icon: https://raw.githubusercontent.com/cablate/banini-tracker/master/assets/banner.svg
  tags:
    - Tool
    - Automation
  readme: |-
    # banini-tracker

    追蹤「股海冥燈」巴逆逆（8zz）的 Facebook 貼文，透過 AI 反指標分析，自動推送到 Telegram / Discord / LINE。

    ## 部署後設定

    部署完成後，打開網頁設定頁面（Zeabur 會自動分配網域），首次進入需建立管理員帳密，然後在頁面上填入：

    - APIFY_TOKEN（必填）
    - LLM_API_KEY（必填）
    - 至少一個通知管道（Telegram / Discord / LINE）

    其餘設定皆有合理預設值，可按需調整。

    ## 排程

    | 時間 | 說明 |
    |------|------|
    | 每天 08:00 | 早晨補漏（3 篇） |
    | 週一~五 09:07-13:07 每 30 分 | 盤中追蹤（1 篇） |
    | 週一~五 15:00 | 預測追蹤更新 |
    | 每天 23:03 | 盤後彙整（3 篇） |

    ## 詳細說明

    [GitHub README](https://github.com/cablate/banini-tracker)
  variables:
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: Domain
      description: 設定頁面網域
  services:
    - name: banini-tracker
      icon: https://raw.githubusercontent.com/cablate/banini-tracker/master/assets/banner.svg
      template: PREBUILT
      domainKey: PUBLIC_DOMAIN
      spec:
        source:
          image: ghcr.io/cablate/banini-tracker:latest
        ports:
          - id: web
            port: 3000
            type: HTTP
        volumes:
          - id: data
            dir: /data
        env:
          DATA_DIR:
            default: "/data"
            readonly: true
  locales:
    zh-TW:
      description: 巴逆逆（8zz）反指標追蹤器 — AI 分析 Facebook 貼文 + 多平台推送（Telegram / Discord / LINE）
      variables:
        - key: PUBLIC_DOMAIN
          name: 網域
          description: 設定頁面的網域
