name: Banini Tracker

on:
  schedule:
    # 台灣時間平日 08:35 (UTC 00:35)
    - cron: '35 0 * * 1-5'
    # 台灣時間平日 09:05 - 13:35 (UTC 01:05 - 05:35) 每半小時一次
    - cron: '5,35 1-5 * * 1-5'
    # 台灣時間平日 20:05 - 23:35 (UTC 12:05 - 15:35) 每半小時一次
    - cron: '5,35 12-15 * * 1-5'
    # 台灣時間平日 00:05 (UTC 16:05)
    - cron: '5 16 * * 1-5'
  workflow_dispatch:

jobs:
  track-banini:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # 需要完整權限來 push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Banini Tracker
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python main.py

      - name: Commit and Push state
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f data/seen.json ]; then
            git add data/seen.json
            git diff-index --quiet HEAD || git commit -m "chore: update seen posts state"
            git push
          fi
