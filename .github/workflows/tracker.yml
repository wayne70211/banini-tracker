name: Banini Tracker

on:
  schedule:
    # 台灣時間平日 08:30 (UTC 00:30)
    - cron: '30 0 * * 1-5'
    # 台灣時間平日 09:00 - 13:30 (UTC 01:00 - 05:30) 每半小時一次
    - cron: '0,30 1-5 * * 1-5'
    # 台灣時間平日 20:00 - 23:30 (UTC 12:00 - 15:30) 每半小時一次
    - cron: '0,30 12-15 * * 1-5'
    # 台灣時間平日 00:00 (UTC 16:00)
    - cron: '0 16 * * 1-5'
  workflow_dispatch:

jobs:
  track-banini:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # 需要完整權限來 push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Banini Tracker
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python main.py

      - name: Commit and Push state
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f data/seen.json ]; then
            git add data/seen.json
            git diff-index --quiet HEAD || git commit -m "chore: update seen posts state"
            git push
          fi
